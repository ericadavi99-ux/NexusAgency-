<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NexusAgency | Painel Admin</title>
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .box { width: 100%; max-width: 400px; background: #0f172a; padding: 20px; border-radius: 20px; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #020617; border: 1px solid #4f46e5; border-radius: 10px; color: white; }
        button { width: 48%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2>Painel Master</h2>
    <input type="text" id="target-name" placeholder="Nome do Cliente">
    <input type="text" id="dl-link" placeholder="Link de Entrega (Apenas se aprovar)">
    <div style="display:flex; justify-content: space-between;">
        <button style="background: #10b981;" onclick="sendCommand('APROVADO')">APROVAR</button>
        <button style="background: #ef4444;" onclick="sendCommand('RECUSADO')">RECUSAR</button>
    </div>
</div>

<script>
    const T = "8758890343:AAFxAzlIY53_F0UadlhE1RzzbnopAEO9WEo";
    const ID = "7960867927";

    async function sendCommand(status) {
        const name = document.getElementById('target-name').value;
        const link = document.getElementById('dl-link').value;
        const text = status === 'APROVADO' ? `STATUS_APROVADO|${name}|${link}` : `STATUS_RECUSADO|${name}`;
        
        await fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(text)}`);
        alert("Comando enviado para: " + name);
    }
</script>
</body>
</html>
